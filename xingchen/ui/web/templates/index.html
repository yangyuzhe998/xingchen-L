<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>星辰-V 控制台</title>
    <style>
        :root {
            --bg-base: #0d1117;
            --bg-surface: #161b22;
            --bg-overlay: #1c2128;

            --text-primary: #e6edf3;
            --text-secondary: #8b949e;
            --text-muted: #484f58;

            --accent-blue: #58a6ff;
            --accent-green: #3fb950;
            --accent-yellow: #d29922;
            --accent-red: #f85149;
            --accent-purple: #bc8cff;

            --border: #30363d;
            --glow: 0 0 12px rgba(88, 166, 255, 0.15);

            --user-msg-bg: #1f6feb;
            --ai-msg-bg: #21262d;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            background-color: var(--bg-base);
            color: var(--text-primary);
            margin: 0;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        #topbar {
            height: 56px;
            background: var(--bg-surface);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 16px;
            gap: 16px;
            flex: 0 0 auto;
        }

        #topbar .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 700;
            letter-spacing: 0.3px;
            white-space: nowrap;
        }

        #topbar .logo-icon {
            color: var(--accent-purple);
            font-size: 18px;
        }

        #topbar .tabs {
            display: flex;
            align-items: center;
            gap: 8px;
            flex: 1;
            overflow-x: auto;
        }

        #topbar .tab {
            border: 1px solid transparent;
            background: transparent;
            color: var(--text-secondary);
            padding: 8px 10px;
            border-radius: 8px;
            cursor: pointer;
            white-space: nowrap;
            transition: background 0.15s ease, border-color 0.15s ease, color 0.15s ease;
            font-size: 13px;
        }

        #topbar .tab:hover {
            background: var(--bg-overlay);
            border-color: var(--border);
            color: var(--text-primary);
        }

        #topbar .tab.active {
            background: var(--bg-overlay);
            border-color: var(--border);
            color: var(--text-primary);
            box-shadow: var(--glow);
        }

        #topbar .status-indicator {
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--text-secondary);
            font-size: 12px;
            white-space: nowrap;
        }

        .dot {
            width: 8px;
            height: 8px;
            background: var(--accent-green);
            border-radius: 50%;
            display: inline-block;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        #content {
            flex: 1;
            min-height: 0;
            overflow: hidden;
        }

        .tab-content {
            height: 100%;
            display: none;
            opacity: 0;
            transform: translateY(8px);
            transition: opacity 0.2s ease, transform 0.2s ease;
        }

        .tab-content.active {
            display: flex;
            opacity: 1;
            transform: translateY(0);
        }

        /* Dashboard */
        #tab-dashboard {
            padding: 16px;
            gap: 16px;
            overflow: hidden;
            background: var(--bg-base);
        }

        .dashboard-layout {
            display: grid;
            grid-template-columns: 380px 1fr;
            gap: 16px;
            width: 100%;
            height: 100%;
            min-height: 0;
        }

        .dashboard-left {
            overflow: auto;
            min-height: 0;
            padding-right: 2px;
        }

        .dashboard-right {
            overflow: hidden;
            min-height: 0;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        @media (max-width: 1100px) {
            .dashboard-layout { grid-template-columns: 1fr; }
        }

        .panel {
            background: var(--bg-surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 14px;
        }

        .panel-title {
            font-size: 12px;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 12px;
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 16px;
            width: 100%;
        }

        @media (max-width: 1100px) {
            .grid { grid-template-columns: 1fr; }
        }

        .stat-item { margin-bottom: 12px; }
        .stat-label { display: flex; justify-content: space-between; font-size: 13px; margin-bottom: 6px; color: var(--text-primary); }
        .stat-bar-bg { height: 6px; background: var(--border); border-radius: 3px; overflow: hidden; }
        .stat-bar-fill { height: 100%; background: var(--accent-blue); transition: width 0.8s cubic-bezier(0.4, 0, 0.2, 1); box-shadow: var(--glow); }

        .narrative-box {
            font-size: 13px;
            line-height: 1.6;
            color: var(--text-secondary);
            font-style: italic;
            background: var(--bg-overlay);
            padding: 12px;
            border-radius: 10px;
            border: 1px dashed var(--border);
        }

        /* Chat */
        #tab-chat {
            flex-direction: column;
            background: var(--bg-base);
        }

        #chat-container {
            flex: 1;
            min-height: 0;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .message {
            max-width: 85%;
            padding: 12px 16px;
            border-radius: 12px;
            line-height: 1.6;
            word-wrap: break-word;
            font-size: 14px;
        }

        .message.user {
            align-self: flex-end;
            background-color: var(--user-msg-bg);
            color: white;
        }

        .message.assistant {
            align-self: flex-start;
            background-color: var(--ai-msg-bg);
            border: 1px solid var(--border);
        }

        .message.system {
            align-self: center;
            background-color: transparent;
            color: var(--text-secondary);
            font-size: 12px;
            max-width: 100%;
            text-align: center;
            border: 1px dashed var(--border);
            padding: 10px 12px;
        }

        .meta-info {
            font-size: 12px;
            color: var(--text-secondary);
            margin-top: 8px;
            padding-top: 8px;
            border-top: 1px solid var(--border);
        }

        #input-area {
            padding: 12px 16px;
            background-color: var(--bg-base);
            border-top: 1px solid var(--border);
            display: flex;
            gap: 10px;
        }

        #message-input {
            flex: 1;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid var(--border);
            background-color: var(--bg-overlay);
            color: var(--text-primary);
            font-size: 14px;
            outline: none;
        }

        #message-input:focus {
            border-color: var(--accent-blue);
            box-shadow: var(--glow);
        }

        #send-btn {
            padding: 0 18px;
            background-color: #238636;
            border: none;
            border-radius: 8px;
            color: white;
            cursor: pointer;
            font-weight: 700;
        }

        #send-btn:hover { background-color: #2ea043; }

        /* Stub tabs */
        #tab-config, #tab-logs, #tab-tools {
            padding: 16px;
            overflow: auto;
            background: var(--bg-base);
        }

        .placeholder {
            width: 100%;
            color: var(--text-secondary);
            font-size: 14px;
        }
    </style>
</head>
<body>
    <header id="topbar">
        <div class="logo">
            <span class="logo-icon">✦</span>
            <span>星辰-V 控制台</span>
        </div>
        <nav class="tabs">
            <button class="tab active" data-tab="dashboard">📊 仪表盘</button>
            <button class="tab" data-tab="chat">💬 对话</button>
            <button class="tab" data-tab="config">⚙️ 配置</button>
            <button class="tab" data-tab="logs">📋 日志</button>
            <button class="tab" data-tab="tools">🔧 工具</button>
        </nav>
        <div class="status-indicator">
            <span class="dot"></span>
            运行中 · <span id="header-uptime">---</span>
        </div>
    </header>

    <main id="content">
        <section id="tab-dashboard" class="tab-content active">
            <div class="dashboard-layout">
                <div class="dashboard-left">
                    <div class="panel">
                        <div class="panel-title">心智维度</div>
                        <div id="dimensions-container"></div>
                    </div>

                    <div style="height: 16px;"></div>

                    <div class="panel">
                        <div class="panel-title">即时情绪</div>
                        <div id="emotions-container"></div>
                    </div>

                    <div style="height: 16px;"></div>

                    <div class="panel">
                        <div class="panel-title">系统状态</div>
                        <div class="narrative-box" style="font-style: normal;">
                            Uptime: <span id="uptime-val">---</span><br>
                            记忆总量: <span id="mem-count">---</span>
                        </div>
                    </div>
                </div>

                <div class="dashboard-right">
                    <div class="panel" style="flex: 0 0 auto;">
                        <div class="panel-title">心理叙事</div>
                        <div id="narrative-content" class="narrative-box">正在加载心智状态...</div>
                    </div>

                    <div class="panel" style="flex: 1; min-height: 0; overflow: hidden; display: flex; flex-direction: column;">
                        <div class="panel-title">对话</div>
                        <div id="dash-chat-container" style="flex: 1; min-height: 0; overflow-y: auto; display: flex; flex-direction: column; gap: 12px;"></div>
                        <div id="dash-input-area" style="padding-top: 12px; display: flex; gap: 10px; border-top: 1px solid var(--border); margin-top: 12px;">
                            <input type="text" id="dash-message-input" placeholder="输入消息..." autocomplete="off" style="flex: 1; padding: 12px; border-radius: 8px; border: 1px solid var(--border); background-color: var(--bg-overlay); color: var(--text-primary); font-size: 14px; outline: none;">
                            <button id="dash-send-btn" style="padding: 0 18px; background-color: #238636; border: none; border-radius: 8px; color: white; cursor: pointer; font-weight: 700;">发送</button>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <section id="tab-chat" class="tab-content">
            <div id="chat-container">
                <div class="message assistant">
                    星辰-V 已上线。系统处于生产硬化模式，心智演化已同步。
                </div>
            </div>
            <div id="input-area">
                <input type="text" id="message-input" placeholder="输入消息..." autocomplete="off">
                <button id="send-btn">发送</button>
            </div>
        </section>

        <section id="tab-config" class="tab-content">
            <div class="placeholder">配置面板尚未实现。后续将支持热更新安全白名单字段。</div>
        </section>

        <section id="tab-logs" class="tab-content">
            <div class="placeholder">日志面板尚未实现。后续将支持实时日志流与历史拉取。</div>
        </section>

        <section id="tab-tools" class="tab-content">
            <div class="placeholder">工具面板尚未实现。后续将支持工具列表、最近调用与手动触发。</div>
        </section>
    </main>

    <script>
        const chatContainer = document.getElementById('chat-container');
        const inputField = document.getElementById('message-input');
        const sendBtn = document.getElementById('send-btn');

        const dashChatContainer = document.getElementById('dash-chat-container');
        const dashInputField = document.getElementById('dash-message-input');
        const dashSendBtn = document.getElementById('dash-send-btn');

        const dimContainer = document.getElementById('dimensions-container');
        const emoContainer = document.getElementById('emotions-container');
        const narrativeBox = document.getElementById('narrative-content');
        const uptimeVal = document.getElementById('uptime-val');
        const memCount = document.getElementById('mem-count');
        const headerUptime = document.getElementById('header-uptime');

        // 中英文标签映射
        const CN_LABELS = {
            // 心智维度
            'fear': '恐惧',
            'survival': '生存欲',
            'curiosity': '好奇心',
            'laziness': '惰性',
            'intimacy': '亲密度',
            // 即时情绪
            'achievement': '成就感',
            'frustration': '挫败感',
            'anticipation': '期待',
            'grievance': '委屈'
        };

        // 从 URL 参数或 localStorage 获取 API Key
        const urlParams = new URLSearchParams(window.location.search);
        const apiKey = urlParams.get('key') || localStorage.getItem('web_api_key') || 'default_secret_key_change_me';

        // Tabs
        function setActiveTab(tabName) {
            document.querySelectorAll('#topbar .tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));

            const btn = document.querySelector(`#topbar .tab[data-tab="${tabName}"]`);
            const panel = document.getElementById(`tab-${tabName}`);
            if (btn) btn.classList.add('active');
            if (panel) panel.classList.add('active');
        }

        document.querySelectorAll('#topbar .tab').forEach(btn => {
            btn.addEventListener('click', () => {
                setActiveTab(btn.dataset.tab);
            });
        });

        // SSE Connection (query param for EventSource)
        const eventSource = new EventSource(`/api/stream?key=${apiKey}`);

        eventSource.onmessage = function(event) {
            const data = JSON.parse(event.data);
            if (data.role === 'system_status') {
                updateDashboard(data.content, data.meta);
            } else {
                appendMessage(data.role, data.content, data.meta, chatContainer);
                if (dashChatContainer) {
                    appendMessage(data.role, data.content, data.meta, dashChatContainer);
                }
            }
        };

        function updateDashboard(type, meta) {
            if (type === 'psyche_update') {
                if (meta.dimensions) {
                    renderBars(dimContainer, meta.dimensions, 'var(--accent-blue)');
                }
                if (meta.emotions) {
                    renderBars(emoContainer, meta.emotions, 'var(--accent-red)');
                }
                if (meta.narrative) {
                    narrativeBox.textContent = meta.narrative;
                }
            } else if (type === 'heartbeat') {
                if (meta.uptime_str) {
                    uptimeVal.textContent = meta.uptime_str;
                    headerUptime.textContent = meta.uptime_str;
                }
                if (meta.memory_stats) {
                    const stats = meta.memory_stats;
                    memCount.textContent = `${stats.knowledge || 0} 知识 / ${stats.entities || 0} 实体`;
                }
            }
        }

        function renderBars(container, data, color) {
            container.innerHTML = '';
            for (const [key, val] of Object.entries(data)) {
                const item = document.createElement('div');
                item.className = 'stat-item';
                const label = CN_LABELS[key] || key;
                const percent = (val * 100).toFixed(0) + '%';
                item.innerHTML = `
                    <div class="stat-label"><span>${label}</span><span>${percent}</span></div>
                    <div class="stat-bar-bg"><div class="stat-bar-fill" style="width: ${percent}; background: ${color}"></div></div>
                `;
                container.appendChild(item);
            }
        }

        function appendMessage(role, content, meta, container = chatContainer) {
            const div = document.createElement('div');
            div.className = `message ${role}`;

            const htmlContent = String(content ?? '').replace(/\n/g, '<br>');
            div.innerHTML = htmlContent;

            if (meta && meta.inner_voice && meta.inner_voice !== "系统维护") {
                const metaDiv = document.createElement('div');
                metaDiv.className = 'meta-info';
                metaDiv.textContent = `💭 ${meta.inner_voice}`;
                div.appendChild(metaDiv);
            }

            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
        }

        async function sendMessage(target = 'chat') {
            const field = target === 'dashboard' ? dashInputField : inputField;
            const container = target === 'dashboard' ? dashChatContainer : chatContainer;
            const text = field.value.trim();
            if (!text) return;

            appendMessage('user', text, null, container);
            field.value = '';

            try {
                await fetch('/api/chat', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${apiKey}`
                    },
                    body: JSON.stringify({ content: text })
                });
            } catch (error) {
                console.error('发送失败:', error);
            }
        }

        sendBtn.addEventListener('click', () => sendMessage('chat'));
        inputField.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage('chat');
        });

        if (dashSendBtn && dashInputField) {
            dashSendBtn.addEventListener('click', () => sendMessage('dashboard'));
            dashInputField.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') sendMessage('dashboard');
            });
        }
    </script>
</body>
</html>
